project: ec2-minimal
base_domain: example.com         # placeholder — change to your Route53 zone
aws_account: "000000000000"      # placeholder — change to your account
aws_region: us-east-1

frontend:
  source_path: ./frontend

backend:
  type: ec2
  ec2:
    instance_type: t3.small
    source_path: ./backend/app
    app_entrypoint: "uvicorn handler:app --host 0.0.0.0 --port 8000"
    app_port: 8000
    health_check_path: /health
    secrets:
      - name: DB_PASSWORD

security:
  cors:
    allowed_origins:
      - https://ec2-minimal.example.com

stages:
  prod: {}
  dev:
    security:
      cors:
        allowed_origins: ["*"]
